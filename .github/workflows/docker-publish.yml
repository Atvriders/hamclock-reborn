name: Build and Push Docker Images

# CI-aware: same workflow runs on both Gitea Actions (act_runner) and GitHub
# Actions. The registry it pushes to depends on which CI is running:
#   - Gitea  → git.waterburp.com  (the canonical target — docker-compose pulls here)
#   - GitHub → ghcr.io            (mirror; available as a backup pull source)
# Both CIs use a secret named REGISTRY_TOKEN — on Gitea it's a Gitea PAT, on
# GitHub it's a GitHub PAT with write:packages scope.
#
# Multi-arch: linux/amd64 (x86 / docker-compose on a PC) plus linux/arm64 and
# linux/arm/v7 for Raspberry Pi 2 and newer. The arm layers cross-build under
# QEMU emulation, so a cold run takes a while.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: .
            dockerfile: ./Dockerfile
          - name: backend
            context: ./server
            dockerfile: ./server/Dockerfile
    env:
      REGISTRY: ${{ github.server_url == 'https://github.com' && 'ghcr.io' || 'git.waterburp.com' }}
      IMAGE_OWNER: atvriders
    steps:
      - uses: actions/checkout@v4

      # QEMU binfmt handlers so the runner can cross-build arm images.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Log in to whichever registry this CI publishes to.
      # On Gitea: git.waterburp.com (REGISTRY_TOKEN = Gitea PAT).
      # On GitHub: ghcr.io (REGISTRY_TOKEN = GitHub PAT with write:packages).
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: Atvriders
          password: ${{ secrets.REGISTRY_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/hamclock-reborn-${{ matrix.name }}:latest
