name: Build and Push Docker Images

# Built on the Gitea act_runner and pushed to the Gitea container registry
# at git.waterburp.com. GitHub Actions is disabled for this account, and the
# images are hosted on Gitea (not ghcr.io), so docker-compose pulls from there.
#
# Multi-arch: linux/amd64 (x86 / docker-compose on a PC) plus linux/arm64 and
# linux/arm/v7 for Raspberry Pi 2 and newer. The arm layers cross-build under
# QEMU emulation, so a cold run takes a while.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: .
            dockerfile: ./Dockerfile
          - name: backend
            context: ./server
            dockerfile: ./server/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # QEMU binfmt handlers so the runner can cross-build arm images.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Log in to the Gitea container registry. secrets.GITHUB_TOKEN here is
      # the auto-provisioned Gitea run token, which can push packages for the
      # repo owner — no external PAT needed.
      - uses: docker/login-action@v3
        with:
          registry: git.waterburp.com
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: git.waterburp.com/atvriders/hamclock-reborn-${{ matrix.name }}:latest
