name: Build and Push Docker Images

# Built on the Gitea act_runner (GitHub Actions is disabled for this account)
# and pushed to GitHub Container Registry (ghcr.io).
#
# NOTE: this first revision builds linux/amd64 only — a deliberate probe to
# confirm the runner has Docker and that the ghcr.io push works. Once the
# pipeline is green it is expanded to multi-arch (arm64 + armv7) for the Pi.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: .
            dockerfile: ./Dockerfile
          - name: backend
            context: ./server
            dockerfile: ./server/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Authenticate to ghcr.io with a GitHub PAT (write:packages) stored as a
      # Gitea Actions secret — secrets.GITHUB_TOKEN here would be the Gitea
      # token, which cannot push to GitHub's registry.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Atvriders
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ghcr.io/atvriders/hamclock-reborn-${{ matrix.name }}:latest
