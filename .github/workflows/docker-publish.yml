name: Build and Push Docker Images

# Built on the Gitea act_runner (GitHub Actions is disabled for this account)
# and pushed to GitHub Container Registry (ghcr.io).
#
# Multi-arch: linux/amd64 (x86 servers / docker-compose) plus linux/arm64 and
# linux/arm/v7 for Raspberry Pi 2 and newer. The arm images are cross-built
# under QEMU emulation, so a cold run can take a while.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: frontend
            context: .
            dockerfile: ./Dockerfile
          - name: backend
            context: ./server
            dockerfile: ./server/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # QEMU binfmt handlers so the runner can cross-build arm images.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Authenticate to ghcr.io with a GitHub PAT (write:packages) stored as a
      # Gitea Actions secret — secrets.GITHUB_TOKEN here would be the Gitea
      # token, which cannot push to GitHub's registry.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Atvriders
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ghcr.io/atvriders/hamclock-reborn-${{ matrix.name }}:latest
